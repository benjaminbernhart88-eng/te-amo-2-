<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Te Amo Infinito</title>

<style>
    body{
        margin:0;
        padding:20px;
        background:black;
        color:white;
        font-family:Arial;
        overflow-y:scroll;
    }

    #texto{
        font-size:22px;
        line-height:1.6;
        word-break:break-word;
    }
</style>
</head>

<body>

<div id="texto"></div>

<script>
const texto = document.getElementById("texto");

function agregarMuchos(){
    let bloque = "";

    for(let i = 0; i < 5000; i++){
        bloque += "Te amo mucho ";
    }

    texto.innerHTML += bloque;
}

// Genera al inicio
agregarMuchos();

// Cuando bajas, genera más automáticamente
window.addEventListener("scroll", () => {
    if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 500){
        agregarMuchos();
    }
});
</script>

</body>
</html>
