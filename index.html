<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Te Amo Infinito</title>

<style>
    body{
        background:black;
        color:white;
        font-family:Arial;
        margin:0;
        padding:20px;
        overflow-y:scroll;
    }

    #texto{
        font-size:20px;
        line-height:1.5;
        word-break:break-word;
    }
</style>
</head>

<body>

<div id="texto"></div>

<script>
const texto = document.getElementById("texto");

let generados = 0;

// Genera 2 millones de "mucho"
function generarBloque() {
    texto.innerText += "mucho ".repeat(2000000);
    generados += 2000000;

    console.log("Generados:", generados);
}

// Inicio con 2 millones
texto.innerText = "Te amo ";
generarBloque();

// Cuando bajas cerca del final,
// genera otros 2 millones infinitamente
window.addEventListener("scroll", () => {

    const bajando =
        window.innerHeight + window.scrollY >=
        document.body.offsetHeight - 1000;

    if (bajando) {
        generarBloque();
    }

});
</script>

</body>
</html>
